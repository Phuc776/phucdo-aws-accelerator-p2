apiVersion: v1
kind: Namespace
metadata:
  name: w8-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: w8-demo
data:
  APP_ENV: "dev"
  APP_NAME: "nginx-demo"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: w8-demo
type: Opaque
stringData:
  API_KEY: "demo-secret-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app
  namespace: w8-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80

          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret

          startupProbe:
            httpGet:
              path: /
              port: 80
            failureThreshold: 10
            periodSeconds: 3

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: w8-demo
spec:
  type: NodePort
  selector:
    app: nginx-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nginx-ingress
  namespace: w8-demo
spec:
  podSelector:
    matchLabels:
      app: nginx-app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 80